name: Config UI diagnostics

on:
  pull_request:
    paths:
      - 'src/**'
      - 'test/**'
      - 'tsconfig.json'
      - 'package*.json'
      - '.github/workflows/config-ui-diagnostics.yml'

permissions:
  contents: read

jobs:
  typecheck-diagnostics:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Capture typecheck output
        id: typecheck
        shell: bash
        run: |
          set +e
          npm run typecheck > typecheck-diagnostics.txt 2>&1
          status=$?
          echo "status=$status" >> "$GITHUB_OUTPUT"
          exit 0
      - uses: actions/upload-artifact@v4
        with:
          name: config-ui-typecheck-diagnostics
          path: typecheck-diagnostics.txt
          if-no-files-found: error
      - name: Enforce typecheck result
        run: test "${{ steps.typecheck.outputs.status }}" = "0"
