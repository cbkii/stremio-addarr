name: Apply Trakt review fixes

on:
  push:
    branches:
      - agent/fix-trakt-device-auth

permissions:
  contents: write

concurrency:
  group: trakt-review-fixes
  cancel-in-progress: false

jobs:
  patch-test-commit:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/fix-trakt-device-auth
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Apply review fixes and regressions
        run: |
          python3 - <<'PY'
          from pathlib import Path

          def replace_once(path_name, old, new):
              path = Path(path_name)
              content = path.read_text()
              count = content.count(old)
              if count != 1:
                  raise SystemExit(f'{path_name}: expected one match, found {count}: {old[:100]!r}')
              path.write_text(content.replace(old, new, 1))

          replace_once(
              'scripts/trakt-device-auth.mjs',
              '''  const apiBaseUrl = await promptRequired(
            rl,
            'Trakt API base URL',
            values.get('TRAKT_API_BASE_URL') ?? 'https://api.trakt.tv'
          );
          const parsed = new URL(apiBaseUrl);
          if (!['http:', 'https:'].includes(parsed.protocol)) throw new Error('Trakt API base URL must use HTTP or HTTPS.');
          return {
            clientId,
            clientSecret,
            redirectUri,
            apiBaseUrl: apiBaseUrl.replace(/\/+$/, '')
          };
          ''',
              '''  let apiBaseUrl = '';
          let suggestedApiBaseUrl = values.get('TRAKT_API_BASE_URL') ?? 'https://api.trakt.tv';
          while (true) {
            const candidate = await promptRequired(rl, 'Trakt API base URL', suggestedApiBaseUrl);
            try {
              const parsed = new URL(candidate);
              if (!['http:', 'https:'].includes(parsed.protocol)) {
                console.log('Trakt API base URL must use HTTP or HTTPS.');
                suggestedApiBaseUrl = '';
                continue;
              }
              if (parsed.username || parsed.password || parsed.search || parsed.hash || parsed.pathname !== '/') {
                console.log('Use only the API origin, for example https://api.trakt.tv.');
                suggestedApiBaseUrl = '';
                continue;
              }
              apiBaseUrl = parsed.origin;
              break;
            } catch {
              console.log('Invalid URL format. Enter a complete URL such as https://api.trakt.tv.');
              suggestedApiBaseUrl = '';
            }
          }
          return {
            clientId,
            clientSecret,
            redirectUri,
            apiBaseUrl
          };
          '''
          )

          replace_once(
              'src/services/trakt-auth.ts',
              '''    if (response.status === 429) {
            const retryAfterSec = parseRetryAfter(response.headers.get('retry-after'));
            intervalSec = Math.max(intervalSec + 1, retryAfterSec || intervalSec + 5);
            options.onStatus?.('slow_down', String(intervalSec));
            continue;
          }

          const code = parseErrorCode(text);
          ''',
              '''    if (response.status === 429) {
            const retryAfterSec = parseRetryAfter(response.headers.get('retry-after'));
            intervalSec = Math.max(intervalSec + 1, retryAfterSec || intervalSec + 5);
            options.onStatus?.('slow_down', String(intervalSec));
            continue;
          }
          if (response.status >= 500 && response.status < 600) {
            transientErrors += 1;
            options.onStatus?.('server_error', `HTTP ${response.status}`);
            if (transientErrors >= 3) {
              throw new TraktAuthError(
                `trakt_device_http_${response.status}`,
                response.status,
                'temporary Trakt server error during device polling',
                0,
                text
              );
            }
            continue;
          }

          const code = parseErrorCode(text);
          '''
          )

          test_path = Path('test/trakt-auth.test.ts')
          test_content = test_path.read_text()
          test_content += '''

          test('device flow retries temporary Trakt 5xx responses before success', async () => {
            let now = 0;
            const statuses: string[] = [];
            const responses = [
              new Response('{"error":"temporary"}', { status: 503 }),
              new Response('{"access_token":"access","refresh_token":"refresh"}', { status: 200 })
            ];

            const token = await pollTraktDeviceToken({
              apiBaseUrl: 'https://api.trakt.tv',
              clientId: 'client',
              clientSecret: 'secret',
              userAgent: 'stremio-addarr/test',
              device: {
                device_code: 'device',
                user_code: 'ABCD1234',
                verification_url: 'https://trakt.tv/activate',
                expires_in: 60,
                interval: 1
              },
              fetchImpl: (async () => responses.shift() ?? new Response('{}', { status: 500 })) as typeof fetch,
              now: () => now,
              sleep: async (ms) => { now += ms; },
              onStatus: (status) => statuses.push(status)
            });

            assert.equal(token.access_token, 'access');
            assert.deepEqual(statuses, ['server_error']);
          });

          test('device flow stops after three consecutive Trakt 5xx responses', async () => {
            let now = 0;
            await assert.rejects(
              pollTraktDeviceToken({
                apiBaseUrl: 'https://api.trakt.tv',
                clientId: 'client',
                clientSecret: 'secret',
                userAgent: 'stremio-addarr/test',
                device: {
                  device_code: 'device',
                  user_code: 'ABCD1234',
                  verification_url: 'https://trakt.tv/activate',
                  expires_in: 60,
                  interval: 1
                },
                fetchImpl: (async () => new Response('{"error":"temporary"}', { status: 503 })) as typeof fetch,
                now: () => now,
                sleep: async (ms) => { now += ms; }
              }),
              (error: unknown) => error instanceof TraktAuthError
                && error.message === 'trakt_device_http_503'
            );
          });
          '''
          test_path.write_text(test_content)

          replace_once(
              'test/quick-script.test.ts',
              "  assert.match(helper, /new device code/);\n",
              "  assert.match(helper, /new device code/);\n"
              "  assert.match(helper, /Invalid URL format/);\n"
              "  assert.match(helper, /Use only the API origin/);\n"
          )
          PY

      - name: Install and validate
        run: |
          npm ci
          bash -n quick.sh
          node --check scripts/trakt-device-auth.mjs
          npm run ci
          npm run package:release
          tar -tzf dist/stremio-addarr-install.tar.gz | grep -qx './scripts/trakt-device-auth.mjs'

      - name: Commit clean review fixes
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git rm .github/workflows/trakt-review-fixes.yml
          git add -A
          git commit -m 'Harden Trakt authentication retry paths'
          git push origin HEAD:agent/fix-trakt-device-auth
