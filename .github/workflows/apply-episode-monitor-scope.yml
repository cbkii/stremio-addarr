name: Apply episode monitor scope tile change

on:
  push:
    branches:
      - agent/episode-monitor-scope-tile
    paths:
      - scripts/apply-episode-monitor-scope.py
      - .github/workflows/apply-episode-monitor-scope.yml

permissions:
  contents: write

jobs:
  apply-and-validate:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/episode-monitor-scope-tile
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
      - name: Apply focused source and test change
        run: python scripts/apply-episode-monitor-scope.py
      - name: Install exact dependencies
        run: npm ci
      - name: Validate
        run: |
          git diff --check
          npm run ci
      - name: Commit validated implementation
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/services/status.ts test/addon.test.ts
          git commit -m "show Sonarr monitor scope on episode action tiles"
          git push origin HEAD:agent/episode-monitor-scope-tile
