name: Release

# ─── Supported release triggers ───────────────────────────────────────────
# 1. Tag push:           push a semver tag like v1.2.3
# 2. Manual dispatch:    Actions → Release → Run workflow (version input)
# 3. PR comment command: comment `/release` or `/release-dry-run` on a PR
#    • Only collaborators/owners may trigger.
#    • `/release-dry-run` builds and packages but does NOT publish.
#    • `/release` builds, packages, tags, and publishes a real release.
# ──────────────────────────────────────────────────────────────────────────

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+' # semver tags only
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g. 1.2.3 — without the v prefix)'
        required: true
        type: string
  issue_comment:
    types: [created]

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write
  pull-requests: write

jobs:
  # ── Gate for PR-comment triggers ──────────────────────────────────────
  pr-comment-gate:
    if: >-
      github.event_name == 'issue_comment'
      && github.event.issue.pull_request
      && (
        startsWith(github.event.comment.body, '/release-dry-run')
        || startsWith(github.event.comment.body, '/release')
      )
    runs-on: ubuntu-latest
    outputs:
      allowed: ${{ steps.check.outputs.allowed }}
      dry_run: ${{ steps.check.outputs.dry_run }}
      pr_sha:  ${{ steps.pr.outputs.sha }}
    steps:
      - name: Check permission
        id: check
        env:
          ASSOC: ${{ github.event.comment.author_association }}
          BODY:  ${{ github.event.comment.body }}
        run: |
          # Only OWNER, MEMBER, or COLLABORATOR may trigger releases
          case "$ASSOC" in
            OWNER|MEMBER|COLLABORATOR) echo "allowed=true" >> "$GITHUB_OUTPUT" ;;
            *) echo "allowed=false" >> "$GITHUB_OUTPUT" ;;
          esac
          # Detect dry-run vs real release
          if [[ "$BODY" == /release-dry-run* ]]; then
            echo "dry_run=true"  >> "$GITHUB_OUTPUT"
          else
            echo "dry_run=false" >> "$GITHUB_OUTPUT"
          fi

      - name: React to comment
        if: steps.check.outputs.allowed == 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh api \
            repos/${{ github.repository }}/issues/comments/${{ github.event.comment.id }}/reactions \
            -f content='rocket' --silent || true

      - name: Reject unauthorised trigger
        if: steps.check.outputs.allowed != 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh api \
            repos/${{ github.repository }}/issues/comments/${{ github.event.comment.id }}/reactions \
            -f content='-1' --silent || true
          echo "::error::User is not a collaborator/owner – ignoring /release command."
          exit 1

      - name: Resolve PR head SHA
        if: steps.check.outputs.allowed == 'true'
        id: pr
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          SHA=$(gh api repos/${{ github.repository }}/pulls/${{ github.event.issue.number }} --jq '.head.sha')
          echo "sha=$SHA" >> "$GITHUB_OUTPUT"

  # ── Main release job ──────────────────────────────────────────────────
  release:
    needs: [pr-comment-gate]
    # Run when:
    #   • tag push or workflow_dispatch (pr-comment-gate is skipped → needs still pass)
    #   • PR comment AND gate allowed it
    if: >-
      always()
      && (
        github.event_name == 'push'
        || github.event_name == 'workflow_dispatch'
        || (needs.pr-comment-gate.result == 'success' && needs.pr-comment-gate.outputs.allowed == 'true')
      )
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      DRY_RUN: ${{ needs.pr-comment-gate.outputs.dry_run || 'false' }}
    steps:
      # ── Determine version & ref ───────────────────────────────────────
      - name: Resolve version
        id: ver
        run: |
          if [[ "${{ github.event_name }}" == "push" ]]; then
            TAG="${GITHUB_REF_NAME}"          # e.g. v1.2.3
          elif [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            TAG="v${{ github.event.inputs.version }}"
          else
            # PR-comment: derive from package.json after checkout
            TAG=""
          fi
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.pr-comment-gate.outputs.pr_sha || github.ref }}

      - name: Resolve PR-comment version
        if: github.event_name == 'issue_comment'
        id: pr_ver
        run: |
          VER=$(node -p "require('./package.json').version")
          echo "tag=v${VER}" >> "$GITHUB_OUTPUT"

      - name: Set final tag
        id: final
        run: |
          TAG="${{ steps.ver.outputs.tag }}"
          if [[ -z "$TAG" ]]; then
            TAG="${{ steps.pr_ver.outputs.tag }}"
          fi
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "### Release tag: \`$TAG\`" >> "$GITHUB_STEP_SUMMARY"

      # ── Build & verify ────────────────────────────────────────────────
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm run test:ci

      - name: Build
        run: npm run build

      # ── Package ───────────────────────────────────────────────────────
      - name: Package release
        run: npm run package:release

      - name: Validate archive exists
        run: |
          test -f dist/stremio-addarr-install.tar.gz \
            || { echo "::error::Primary archive missing"; exit 1; }
          test -f dist/stremio-addarr-install.tar.gz.sha256 \
            || { echo "::error::Checksum file missing"; exit 1; }
          echo "Archive contents:"
          tar -tzf dist/stremio-addarr-install.tar.gz | head -40

      # ── Publish (skip on dry-run) ─────────────────────────────────────
      - name: Create tag (if needed)
        if: env.DRY_RUN != 'true' && github.event_name != 'push'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ steps.final.outputs.tag }}
        run: |
          git tag "$TAG" || true
          git push origin "$TAG" || true

      - name: Generate release body
        id: body
        env:
          TAG: ${{ steps.final.outputs.tag }}
          REPO: ${{ github.repository }}
        run: |
          cat > /tmp/release-body.md << 'RELEASE_EOF'
          ## Install

          **Download:** [`stremio-addarr-install.tar.gz`](https://github.com/${REPO}/releases/download/${TAG}/stremio-addarr-install.tar.gz)
          **Checksum:** [`stremio-addarr-install.tar.gz.sha256`](https://github.com/${REPO}/releases/download/${TAG}/stremio-addarr-install.tar.gz.sha256)

          ### Quick Raspberry Pi install

          ```bash
          cd /opt
          sudo tar -xzf stremio-addarr-install.tar.gz -C stremio-addarr --strip-components=1
          cd stremio-addarr
          npm ci --omit=dev
          cp .env.example .env && nano .env
          sudo cp deploy/stremio-addarr.service.example /etc/systemd/system/stremio-addarr.service
          sudo systemctl daemon-reload && sudo systemctl enable --now stremio-addarr
          ```

          ### Hosting modes (Android TV compatible)

          | Mode | Description |
          |------|-------------|
          | **DuckDNS + Caddy + Let's Encrypt** | Default recommended. Free dynamic DNS, automatic HTTPS via Caddy. Requires router port forwarding (80/443). |
          | **Tailscale Funnel** | No port forwarding needed. Public HTTPS via `*.ts.net`. |

          See the full hosting guide: [`README_HOST.md`](https://github.com/${REPO}/blob/${TAG}/README_HOST.md)

          ### Install in Stremio

          Open this URL on your Android TV or any Stremio client:
          ```
          https://YOUR-HOSTNAME/manifest.json
          ```

          ### Upgrade from a previous release

          ```bash
          cd /opt/stremio-addarr
          sudo tar -xzf /path/to/stremio-addarr-install.tar.gz --strip-components=1
          npm ci --omit=dev
          sudo systemctl restart stremio-addarr
          ```

          ### Documentation

          - [README.md](https://github.com/${REPO}/blob/${TAG}/README.md) — full setup guide
          - [README_HOST.md](https://github.com/${REPO}/blob/${TAG}/README_HOST.md) — hosting setup (DuckDNS/Caddy and Tailscale Funnel)
          RELEASE_EOF

          # Expand env vars in the template
          envsubst < /tmp/release-body.md > /tmp/release-body-final.md

      - name: Create GitHub Release
        if: env.DRY_RUN != 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ steps.final.outputs.tag }}
        run: |
          gh release create "$TAG" \
            dist/stremio-addarr-install.tar.gz \
            dist/stremio-addarr-install.tar.gz.sha256 \
            --title "$TAG" \
            --notes-file /tmp/release-body-final.md \
            --latest

      - name: Dry-run summary
        if: env.DRY_RUN == 'true'
        run: |
          echo "### 🏜️ Dry-run complete — no release published" >> "$GITHUB_STEP_SUMMARY"
          echo "Archive: dist/stremio-addarr-install.tar.gz" >> "$GITHUB_STEP_SUMMARY"
          echo "Checksum:" >> "$GITHUB_STEP_SUMMARY"
          cat dist/stremio-addarr-install.tar.gz.sha256 >> "$GITHUB_STEP_SUMMARY"

      - name: Comment on PR
        if: github.event_name == 'issue_comment'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ steps.final.outputs.tag }}
          DRY_RUN: ${{ env.DRY_RUN }}
        run: |
          if [[ "$DRY_RUN" == "true" ]]; then
            MSG="✅ **Dry-run** for \`$TAG\` succeeded — archive built and verified, no release published."
          else
            MSG="🚀 **Release \`$TAG\`** published: https://github.com/${{ github.repository }}/releases/tag/$TAG"
          fi
          gh pr comment "${{ github.event.issue.number }}" --body "$MSG"
