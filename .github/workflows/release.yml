name: Release

# ─── Supported release triggers ───────────────────────────────────────────
# 1. Tag push:           push a semver tag like v1.2.3
# 2. Manual dispatch:    Actions → Release → Run workflow (version + dry_run)
# 3. PR comment command: comment `/release` or `/release-dry-run` on a PR
#    • Only collaborators/owners/members may trigger.
#    • `/release-dry-run` builds and packages but does NOT publish.
#    • `/release` builds, packages, tags, and publishes a real release.
# ──────────────────────────────────────────────────────────────────────────

on:
  push:
    tags:
      - 'v[0-9]*.[0-9]*.[0-9]*' # semver tags only — glob syntax, not regex (v1.2.3)
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g. 1.2.3 — without the v prefix). Must be X.Y.Z semver.'
        required: true
        type: string
      dry_run:
        description: 'Dry run — build and verify archive without publishing a release'
        required: false
        type: boolean
        default: false
  issue_comment:
    types: [created]

# One release at a time. Use the tag name so parallel tag pushes are independent,
# but PR-comment and dispatch runs share a single slot (ref is the default branch).
concurrency:
  group: release-${{ github.ref }}-${{ github.event.issue.number || '' }}
  cancel-in-progress: false

permissions:
  contents: write       # create tags, create/update releases, push commits
  issues: write         # add reactions to issue/PR comments
  pull-requests: write  # comment on pull requests

jobs:
  # ── Gate for PR-comment triggers ──────────────────────────────────────
  pr-comment-gate:
    if: >-
      github.event_name == 'issue_comment'
      && github.event.issue.pull_request
      && (
        startsWith(github.event.comment.body, '/release-dry-run')
        || startsWith(github.event.comment.body, '/release')
      )
    runs-on: ubuntu-latest
    outputs:
      allowed: ${{ steps.check.outputs.allowed }}
      dry_run: ${{ steps.check.outputs.dry_run }}
      pr_sha:  ${{ steps.pr.outputs.sha }}
      version: ${{ steps.check.outputs.version }}
    steps:
      - name: Check permission
        id: check
        env:
          ASSOC: ${{ github.event.comment.author_association }}
          BODY:  ${{ github.event.comment.body }}
        run: |
          # Only OWNER, MEMBER, or COLLABORATOR may trigger releases
          case "$ASSOC" in
            OWNER|MEMBER|COLLABORATOR) echo "allowed=true"  >> "$GITHUB_OUTPUT" ;;
            *)                         echo "allowed=false" >> "$GITHUB_OUTPUT" ;;
          esac
          # Detect dry-run before checking /release (dry-run also starts with /release)
          if [[ "$BODY" == /release-dry-run* ]]; then
            echo "dry_run=true"  >> "$GITHUB_OUTPUT"
          else
            echo "dry_run=false" >> "$GITHUB_OUTPUT"
          fi
          # Extract optional X.Y.Z version from "/release X.Y.Z" or "/release-dry-run X.Y.Z".
          # This allows `/release 1.3.0` to trigger a release without a pre-committed version bump.
          if [[ "$BODY" =~ ^/release(-dry-run)?[[:space:]]+([0-9]+\.[0-9]+\.[0-9]+) ]]; then
            echo "version=${BASH_REMATCH[2]}" >> "$GITHUB_OUTPUT"
          else
            echo "version=" >> "$GITHUB_OUTPUT"
          fi

      - name: React — acknowledge
        if: steps.check.outputs.allowed == 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh api \
            repos/${{ github.repository }}/issues/comments/${{ github.event.comment.id }}/reactions \
            -f content='eyes' --silent || true

      - name: React — reject unauthorised
        if: steps.check.outputs.allowed != 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh api \
            repos/${{ github.repository }}/issues/comments/${{ github.event.comment.id }}/reactions \
            -f content='-1' --silent || true
          echo "::error::User (${{ github.event.comment.author_association }}) is not a collaborator/owner — ignoring /release command."
          exit 1

      - name: Resolve PR head SHA
        if: steps.check.outputs.allowed == 'true'
        id: pr
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          SHA=$(gh api "repos/${{ github.repository }}/pulls/${{ github.event.issue.number }}" --jq '.head.sha')
          if [[ -z "$SHA" || "$SHA" == "null" ]]; then
            echo "::error::Could not resolve head SHA for PR ${{ github.event.issue.number }}."
            exit 1
          fi
          echo "sha=$SHA" >> "$GITHUB_OUTPUT"

  # ── Main release job ──────────────────────────────────────────────────
  release:
    needs: [pr-comment-gate]
    # Run when:
    #   • tag push or workflow_dispatch (pr-comment-gate is skipped → 'always()' unblocks)
    #   • PR comment AND gate passed
    if: >-
      always()
      && (
        github.event_name == 'push'
        || github.event_name == 'workflow_dispatch'
        || (needs.pr-comment-gate.result == 'success' && needs.pr-comment-gate.outputs.allowed == 'true')
      )
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      # ── Resolve dry-run flag ─────────────────────────────────────────
      - name: Resolve dry-run flag
        id: flags
        env:
          EVENT:             ${{ github.event_name }}
          DISPATCH_DRY_RUN:  ${{ github.event.inputs.dry_run }}
          COMMENT_DRY_RUN:   ${{ needs.pr-comment-gate.outputs.dry_run }}
        run: |
          if [[ "$EVENT" == "workflow_dispatch" && "$DISPATCH_DRY_RUN" == "true" ]]; then
            echo "dry_run=true" >> "$GITHUB_OUTPUT"
          elif [[ "$EVENT" == "issue_comment" && "$COMMENT_DRY_RUN" == "true" ]]; then
            echo "dry_run=true" >> "$GITHUB_OUTPUT"
          else
            echo "dry_run=false" >> "$GITHUB_OUTPUT"
          fi

      # ── Validate version input (workflow_dispatch or PR comment with explicit version) ──
      - name: Validate version input
        if: >-
          github.event_name == 'workflow_dispatch'
          || (github.event_name == 'issue_comment' && needs.pr-comment-gate.outputs.version != '')
        env:
          VERSION: ${{ github.event.inputs.version || needs.pr-comment-gate.outputs.version }}
        run: |
          if [[ ! "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "::error::Invalid version format '$VERSION'. Expected X.Y.Z (e.g. 1.2.3)."
            exit 1
          fi

      # ── Checkout correct ref ─────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.pr-comment-gate.outputs.pr_sha || github.ref }}
          fetch-depth: 0
          fetch-tags: true

      # ── Resolve final tag ────────────────────────────────────────────
      - name: Resolve tag
        id: tag
        env:
          EVENT:           ${{ github.event_name }}
          VERSION:         ${{ github.event.inputs.version }}
          COMMENT_VERSION: ${{ needs.pr-comment-gate.outputs.version }}
        run: |
          if [[ "$EVENT" == "push" ]]; then
            # Tag was already pushed — use it directly
            TAG="${GITHUB_REF_NAME}"
          elif [[ "$EVENT" == "workflow_dispatch" ]]; then
            TAG="v${VERSION}"
          else
            # PR comment: use explicit version from comment if provided, else derive from package.json
            if [[ -n "${COMMENT_VERSION}" ]]; then
              TAG="v${COMMENT_VERSION}"
            else
              VER=$(node -p "require('./package.json').version")
              TAG="v${VER}"
            fi
          fi
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "version=${TAG#v}" >> "$GITHUB_OUTPUT"
          echo "### Release tag: \`$TAG\`  |  dry_run=${{ steps.flags.outputs.dry_run }}" >> "$GITHUB_STEP_SUMMARY"

      # Update package manifests before build so the runtime manifest version
      # and packaged version always match the release tag. Runs for any trigger
      # where an explicit version is supplied (workflow_dispatch or a PR comment
      # of the form `/release X.Y.Z` or `/release-dry-run X.Y.Z`).
      # For tag-push releases the developer is expected to have run `npm version`
      # locally before pushing the tag (enforced by the Verify step below).
      - name: Sync package version
        if: >-
          github.event_name == 'workflow_dispatch'
          || (github.event_name == 'issue_comment' && needs.pr-comment-gate.outputs.version != '')
        env:
          VERSION: ${{ steps.tag.outputs.version }}
        run: |
          npm version "$VERSION" --no-git-tag-version --allow-same-version

      - name: Verify package version matches release tag
        env:
          TAG_VERSION: ${{ steps.tag.outputs.version }}
        run: |
          PKG_VERSION=$(node -p "require('./package.json').version")
          if [[ "$PKG_VERSION" != "$TAG_VERSION" ]]; then
            echo "::error::package.json version ($PKG_VERSION) does not match release tag version ($TAG_VERSION)."
            exit 1
          fi

      # Persist the version bump to the source branch so the repo always reflects
      # the released version. Skipped for dry runs (ephemeral sync is enough to
      # produce a correctly-versioned build artifact) and for tag-push triggers
      # (where the developer commits the bump themselves before tagging).
      - name: Commit and push version bump
        if: >-
          steps.flags.outputs.dry_run != 'true'
          && (
            github.event_name == 'workflow_dispatch'
            || (github.event_name == 'issue_comment' && needs.pr-comment-gate.outputs.version != '')
          )
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION:   ${{ steps.tag.outputs.version }}
          REF_NAME:  ${{ github.ref_name }}
          PR_NUMBER: ${{ github.event.issue.number }}
          REPO:      ${{ github.repository }}
        run: |
          if git diff --quiet package.json package-lock.json 2>/dev/null; then
            echo "package.json is already at v${VERSION} — no version bump commit needed."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add package.json package-lock.json
          git commit -m "chore: bump version to ${VERSION} [skip ci]"
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            git push origin HEAD:refs/heads/"${REF_NAME}"
          else
            # PR comment: push version bump to the PR's head branch.
            BRANCH=$(gh api "repos/${REPO}/pulls/${PR_NUMBER}" --jq '.head.ref')
            if [[ -z "$BRANCH" || "$BRANCH" == "null" ]]; then
              echo "::error::Could not resolve PR branch name for version bump push."
              exit 1
            fi
            # --force-with-lease is safe here: the release is intentional and we
            # own the branch; it prevents accidentally overwriting an unexpected push.
            git push origin HEAD:refs/heads/"$BRANCH" --force-with-lease || \
              echo "::warning::Version bump push failed (fork PR or concurrent push?) — bump is ephemeral for this release."
          fi
          echo "✅ Version bump committed and pushed." >> "$GITHUB_STEP_SUMMARY"

      # ── Build & verify ────────────────────────────────────────────────
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm run test:ci

      - name: Build
        run: npm run build

      # ── Package ───────────────────────────────────────────────────────
      - name: Package release
        run: npm run package:release

      - name: Validate assets
        run: |
          test -f dist/stremio-addarr-install.tar.gz \
            || { echo "::error::Primary archive missing"; exit 1; }
          test -f dist/stremio-addarr-install.tar.gz.sha256 \
            || { echo "::error::Checksum file missing"; exit 1; }
          cp quick.sh dist/quick.sh
          chmod +x dist/quick.sh
          (cd dist && sha256sum quick.sh > quick.sh.sha256)
          test -f dist/quick.sh \
            || { echo "::error::quick.sh asset missing"; exit 1; }
          test -f dist/quick.sh.sha256 \
            || { echo "::error::quick.sh checksum missing"; exit 1; }
          echo "Archive contents:"
          tar -tzf dist/stremio-addarr-install.tar.gz | sort
          echo "Checksum:"
          cat dist/stremio-addarr-install.tar.gz.sha256
          echo "quick.sh checksum:"
          cat dist/quick.sh.sha256

      # ── Dry-run: stop here ────────────────────────────────────────────
      - name: Dry-run summary
        if: steps.flags.outputs.dry_run == 'true'
        run: |
          echo "### ✅ Dry-run complete — archive verified, no release published" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "**Tag would be:** \`${{ steps.tag.outputs.tag }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "**Checksum:**" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          cat dist/stremio-addarr-install.tar.gz.sha256 >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"

      # ── Publish (real release only) ───────────────────────────────────
      - name: Create tag (if not already pushed)
        if: steps.flags.outputs.dry_run != 'true' && github.event_name != 'push'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ steps.tag.outputs.tag }}
        run: |
          # Check by inspecting remote output rather than relying on exit codes,
          # which can vary between git versions and error conditions.
          REMOTE_REFS=$(git ls-remote --tags origin "refs/tags/${TAG}" 2>&1)
          LS_EXIT=$?
          if [ $LS_EXIT -ne 0 ]; then
            echo "::error::git ls-remote failed (exit code $LS_EXIT): ${REMOTE_REFS}"
            exit 1
          fi
          if [ -n "$REMOTE_REFS" ]; then
            echo "::notice::Tag ${TAG} already exists on remote — skipping tag creation."
          else
            git tag "${TAG}"
            git push origin "${TAG}"
          fi

      - name: Check for existing release
        if: steps.flags.outputs.dry_run != 'true'
        id: existing
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ steps.tag.outputs.tag }}
        run: |
          if gh release view "${TAG}" > /dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "::notice::Release ${TAG} already exists — skipping duplicate creation."
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Generate release body
        if: steps.flags.outputs.dry_run != 'true' && steps.existing.outputs.exists != 'true'
        env:
          TAG:  ${{ steps.tag.outputs.tag }}
          REPO: ${{ github.repository }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PREV_TAG=""
          # Prefer the latest published GitHub release as the comparison baseline.
          # If no published release exists yet, fall back to the previous git tag logic.
          if RELEASE_PREV_TAG=$(gh release list \
            --repo "${REPO}" \
            --limit 200 \
            --exclude-drafts \
            --json tagName,isLatest \
            --jq 'map(select(.tagName != "'"${TAG}"'")) | (map(select(.isLatest == true)) + .)[0].tagName // empty' 2>/dev/null); then
            PREV_TAG="${RELEASE_PREV_TAG}"
          fi
          if [[ -z "${PREV_TAG}" ]]; then
            PREV_TAG=$(git tag --sort=-version:refname | grep -vxF "${TAG}" | head -n1 || true)
          fi
          if [[ -n "${PREV_TAG}" ]]; then
            RANGE="${PREV_TAG}..${TAG}"
            SINCE_ISO=$(git log -1 --format=%cI "${PREV_TAG}")
          else
            RANGE="${TAG}"
            SINCE_ISO=$(git log --reverse --format=%cI | head -n1)
          fi
          UNTIL_ISO=$(git log -1 --format=%cI "${TAG}")

          {
            if [[ -n "${PREV_TAG}" ]]; then
              echo "_Changes since [${PREV_TAG}](https://github.com/${REPO}/releases/tag/${PREV_TAG})_"
            else
              echo "_Changes included in the first tagged release_"
            fi
            echo ""
            echo "### Commits"
            git log --reverse --pretty=format:'- [%h](https://github.com/'"${REPO}"'/commit/%H) %s' "${RANGE}"
            echo ""
            echo "### Pull requests"
            if ! PR_LINES=$(gh pr list \
              --repo "${REPO}" \
              --state merged \
              --search "merged:${SINCE_ISO}..${UNTIL_ISO}" \
              --limit 200 \
              --json number,title,url \
              --jq 'sort_by(.number)[] | "- [#\(.number)](\(.url)) \(.title)"'); then
              echo "::error::Failed to query merged pull requests for release notes."
              exit 1
            fi
            if [[ -n "${PR_LINES}" ]]; then
              echo "${PR_LINES}"
            else
              echo "- None"
            fi
          } > /tmp/version-notes.md

          # Only substitute known variables from template and keep all others intact.
          envsubst '${TAG} ${REPO}' < .github/release-body.md.tmpl > /tmp/release-body.md

          python - <<'PY'
          from pathlib import Path
          release_body = Path("/tmp/release-body.md")
          notes = Path("/tmp/version-notes.md").read_text().rstrip() + "\n"
          token = "${VERSION_NOTES}"
          content = release_body.read_text()
          if token not in content:
              raise SystemExit(f"missing token: {token}")
          release_body.write_text(content.replace(token, notes))
          PY

      - name: Create GitHub Release
        if: steps.flags.outputs.dry_run != 'true' && steps.existing.outputs.exists != 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ steps.tag.outputs.tag }}
        run: |
          gh release create "${TAG}" \
            dist/stremio-addarr-install.tar.gz \
            dist/stremio-addarr-install.tar.gz.sha256 \
            dist/quick.sh \
            dist/quick.sh.sha256 \
            --title "${TAG}" \
            --notes-file /tmp/release-body.md \
            --latest
          echo "### 🚀 Release [${TAG}](https://github.com/${{ github.repository }}/releases/tag/${TAG}) published" >> "$GITHUB_STEP_SUMMARY"

      - name: Verify published assets
        if: steps.flags.outputs.dry_run != 'true' && steps.existing.outputs.exists != 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ steps.tag.outputs.tag }}
        run: |
          echo "Verifying assets on release ${TAG}..."
          ASSETS=$(gh release view "${TAG}" --json assets --jq '.assets[].name')
          echo "Published assets:"
          echo "$ASSETS"
          echo "$ASSETS" | grep -qx 'stremio-addarr-install.tar.gz' \
            || { echo "::error::Missing asset: stremio-addarr-install.tar.gz"; exit 1; }
          echo "$ASSETS" | grep -qx 'stremio-addarr-install.tar.gz.sha256' \
            || { echo "::error::Missing asset: stremio-addarr-install.tar.gz.sha256"; exit 1; }
          echo "$ASSETS" | grep -qx 'quick.sh' \
            || { echo "::error::Missing asset: quick.sh"; exit 1; }
          echo "$ASSETS" | grep -qx 'quick.sh.sha256' \
            || { echo "::error::Missing asset: quick.sh.sha256"; exit 1; }
          echo "### ✅ Verified published assets" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          echo "$ASSETS" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"

      - name: Comment result on PR
        if: github.event_name == 'issue_comment'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG:     ${{ steps.tag.outputs.tag }}
          DRY_RUN: ${{ steps.flags.outputs.dry_run }}
        run: |
          if [[ "$DRY_RUN" == "true" ]]; then
            MSG="✅ **Dry-run** for \`${TAG}\` succeeded — archive built and verified, no release published."
          elif [[ "${{ steps.existing.outputs.exists }}" == "true" ]]; then
            MSG="⚠️ Release \`${TAG}\` already exists — no action taken. See https://github.com/${{ github.repository }}/releases/tag/${TAG}"
          else
            MSG="🚀 **Release \`${TAG}\`** published: https://github.com/${{ github.repository }}/releases/tag/${TAG}"
          fi
          gh pr comment "${{ github.event.issue.number }}" --body "$MSG"

      - name: React — success
        if: github.event_name == 'issue_comment' && steps.flags.outputs.dry_run != 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh api \
            repos/${{ github.repository }}/issues/comments/${{ github.event.comment.id }}/reactions \
            -f content='rocket' --silent || true
