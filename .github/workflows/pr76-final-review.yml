name: PR 76 final review

on:
  push:
    branches: [agent/preserve-existing-arr-settings]

concurrency:
  group: pr76-final-review
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  finalize:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout branch
        uses: actions/checkout@v4
        with:
          ref: agent/preserve-existing-arr-settings
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Apply final review fixes
        run: python3 scripts/address-pr76-final-review.py

      - name: Install
        run: npm ci

      - name: Validate
        run: |
          npm run typecheck
          npm test
          npm run build
          npm run lint:manifest
          npm run package:release

      - name: Remove temporary finalisation files and publish
        run: |
          set -euo pipefail
          rm -f scripts/address-pr76-final-review.py .github/workflows/pr76-final-review.yml
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git commit -m 'Address final PR review feedback'
          git push origin HEAD:agent/preserve-existing-arr-settings
