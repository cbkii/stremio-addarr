name: CI

on:
  push:
    branches: [main]
  pull_request:

# Cancel in-progress CI runs for the same branch/PR when a new commit arrives.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  apply-config-review:
    if: github.event_name == 'pull_request' && github.head_ref == 'agent/android-tv-config-ui'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout feature branch
        uses: actions/checkout@v4
        with:
          ref: agent/android-tv-config-ui
      - name: Apply reviewed defensive fixes and regression coverage
        run: |
          python - <<'PY'
          from pathlib import Path

          source = Path('src/config-ui.ts')
          text = source.read_text()
          original = text

          old_cookie = """    const key = item.slice(0, separator).trim();
    const value = item.slice(separator + 1).trim();
    if (key) result.set(key, decodeURIComponent(value));"""
          new_cookie = """    const key = item.slice(0, separator).trim();
    const value = item.slice(separator + 1).trim();
    if (!key) continue;
    try {
      result.set(key, decodeURIComponent(value));
    } catch {
      // A malformed user-controlled Cookie header must not crash the route.
      result.set(key, value);
    }"""
          if old_cookie in text:
              text = text.replace(old_cookie, new_cookie)

          old_tags = """function normalizeTags(value: unknown, label: string): string {
  const parts = Array.isArray(value)
    ? value
    : (typeof value === 'string' ? value.split(',') : []);
  const tags = parts
    .map((item) => typeof item === 'number' ? item : Number(String(item).trim()))
    .filter((item) => Number.isFinite(item));
  if (parts.length !== tags.length || tags.some((item) => !Number.isInteger(item) || item < 0)) {
    throw new Error(`${label} must be a comma-separated list of non-negative integer IDs.`);
  }
  return tags.join(',');
}"""
          new_tags = """function normalizeTags(value: unknown, label: string): string {
  if (value == null || (typeof value === 'string' && value.trim() === '')) return '';
  const parts = Array.isArray(value)
    ? value
    : (typeof value === 'string' ? value.split(',') : []);
  const cleanedParts = parts
    .map((item) => String(item).trim())
    .filter(Boolean);
  const tags = cleanedParts.map((item) => Number(item));
  if (cleanedParts.length !== tags.length || tags.some((item) => !Number.isInteger(item) || item < 0)) {
    throw new Error(`${label} must be a comma-separated list of non-negative integer IDs.`);
  }
  return tags.join(',');
}"""
          if old_tags in text:
              text = text.replace(old_tags, new_tags)
          text = text.replace(
              "const remote = req.ip ?? req.socket.remoteAddress ?? 'unknown';",
              "const remote = req.ip ?? req.socket?.remoteAddress ?? 'unknown';"
          )
          source.write_text(text)

          tests = Path('test/config-ui.test.ts')
          test_text = tests.read_text()
          marker = "test('Arr connection test and option discovery use candidate credentials without returning them', async () => {"
          if "blank tag fields remain empty rather than becoming tag zero" not in test_text:
              insertion = r'''

test('blank tag fields remain empty rather than becoming tag zero', async () => {
  process.env['CONFIG_UI_TOKEN'] = 'correct-horse-battery-staple';
  const envFile = await tempEnv('RADARR_TAGS=4\nSONARR_TAGS=8\n');
  process.env['CONFIG_UI_ENV_FILE'] = envFile;
  const app = createApp(baseConfig());

  await withServer(app, async (baseUrl) => {
    const session = await login(baseUrl, process.env['CONFIG_UI_TOKEN']!);
    const currentResponse = await ORIGINAL_FETCH(`${baseUrl}/api/config`, { headers: { cookie: session.cookie } });
    const current = (await currentResponse.json()) as { csrf: string; config: Record<string, any> };
    current.config.radarr.tags = '   ';
    current.config.sonarr.tags = '';
    current.config.radarr.apiKey = '';
    current.config.sonarr.apiKey = '';
    current.config.trakt.clientId = '';
    current.config.trakt.clientSecret = '';
    current.config.trakt.refreshToken = '';
    current.config.tmdb.authToken = '';

    const response = await ORIGINAL_FETCH(`${baseUrl}/api/config`, {
      method: 'PUT',
      headers: {
        cookie: session.cookie,
        'content-type': 'application/json',
        'x-csrf-token': current.csrf
      },
      body: JSON.stringify(current.config)
    });
    assert.equal(response.status, 200, await response.text());
    const saved = await fs.readFile(envFile, 'utf8');
    assert.match(saved, /^RADARR_TAGS=$/m);
    assert.match(saved, /^SONARR_TAGS=$/m);
    assert.ok(!saved.includes('RADARR_TAGS=0'));
    assert.ok(!saved.includes('SONARR_TAGS=0'));
  });
});

test('malformed percent-encoded cookies fail authentication without crashing', async () => {
  process.env['CONFIG_UI_TOKEN'] = 'correct-horse-battery-staple';
  process.env['CONFIG_UI_ENV_FILE'] = await tempEnv();
  const app = createApp(baseConfig());

  await withServer(app, async (baseUrl) => {
    const response = await ORIGINAL_FETCH(`${baseUrl}/api/config`, {
      headers: { cookie: 'addarr_config_session=%' }
    });
    assert.equal(response.status, 401);
    const body = (await response.json()) as { error: string };
    assert.equal(body.error, 'authentication_required');
  });
});
'''
              if marker not in test_text:
                  raise SystemExit('missing test insertion marker')
              test_text = test_text.replace(marker, insertion + '\n' + marker)
              tests.write_text(test_text)
          PY
      - name: Commit reviewed fixes when needed
        run: |
          if git diff --quiet -- src/config-ui.ts test/config-ui.test.ts; then
            echo 'Reviewed fixes already applied.'
            exit 0
          fi
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add src/config-ui.ts test/config-ui.test.ts
          git commit -m 'fix: harden configuration input parsing'
          git push origin HEAD:agent/android-tv-config-ui

  test:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install
        run: npm ci

      - name: Catalog-focused regression tests
        run: npm run test:catalog

      - name: Full CI checks (typecheck, tests, build)
        run: npm run ci
