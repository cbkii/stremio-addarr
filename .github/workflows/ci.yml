name: CI

on:
  push:
    branches: [main]
  pull_request:

# Cancel in-progress CI runs for the same branch/PR when a new commit arrives.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install
        run: npm ci

      - name: Catalog-focused regression tests
        run: npm run test:catalog

      - name: Full CI checks (typecheck, tests, build)
        run: npm run ci

      - name: Release packaging smoke test
        run: npm run package:release
