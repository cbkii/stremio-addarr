name: CI

on:
  push:
    branches: [main, agent/preserve-existing-arr-settings]
  pull_request:

# Cancel in-progress CI runs for the same branch/PR when a new commit arrives.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install
        run: npm ci

      - name: Quality gates
        run: npm run ci

      - name: Release packaging smoke test
        run: npm run package:release

  # BEGIN ONE-SHOT ACTIONS REGISTRY PURGE
  purge-obsolete-actions:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: test
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      actions: write
      contents: write
      issues: write
      pull-requests: write
    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Purge runs for workflow files no longer present
        id: purge
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail

          report_unexpected_failure() {
            local status=$?
            if [[ "$status" != "0" ]]; then
              gh pr comment 72 --body \
                "тЭМ Actions purge stopped unexpectedly with exit code ${status} near shell line ${BASH_LINENO[0]:-unknown}. The temporary CI block was retained for diagnosis." \
                >/dev/null 2>&1 || true
            fi
          }
          trap report_unexpected_failure EXIT

          gh pr comment 72 --body \
            "ЁЯФД Actions registry purge retry started. Registrations that disappear after their final run is deleted are now treated as successful cleanup." \
            >/dev/null 2>&1 || true

          live_paths_file="$RUNNER_TEMP/live-workflows.txt"
          obsolete_file="$RUNNER_TEMP/obsolete-workflows.tsv"
          run_ids_file="$RUNNER_TEMP/obsolete-run-ids.txt"
          deleted_file="$RUNNER_TEMP/deleted-run-ids.txt"
          failed_file="$RUNNER_TEMP/failed-operations.txt"
          summary_file="$RUNNER_TEMP/actions-purge-summary.md"

          git ls-files '.github/workflows/*.yml' '.github/workflows/*.yaml' \
            | sort -u > "$live_paths_file"
          : > "$obsolete_file"
          : > "$run_ids_file"
          : > "$deleted_file"
          : > "$failed_file"

          while IFS=$'\t' read -r workflow_id workflow_name workflow_path workflow_state; do
            [[ -n "$workflow_id" ]] || continue
            if grep -Fxq -- "$workflow_path" "$live_paths_file"; then
              echo "Keeping live workflow: ${workflow_name} (${workflow_path})"
              continue
            fi

            printf '%s\t%s\t%s\t%s\n' \
              "$workflow_id" "$workflow_name" "$workflow_path" "$workflow_state" \
              >> "$obsolete_file"

            per_workflow_runs="$RUNNER_TEMP/runs-${workflow_id}.txt"
            if gh api --paginate \
              "repos/${REPO}/actions/workflows/${workflow_id}/runs?per_page=100" \
              --jq '.workflow_runs[].id' > "$per_workflow_runs" 2>/dev/null; then
              cat "$per_workflow_runs" >> "$run_ids_file"
            elif gh api "repos/${REPO}/actions/workflows/${workflow_id}" >/dev/null 2>&1; then
              printf 'run-enumeration\t%s\t%s\n' "$workflow_id" "$workflow_path" \
                >> "$failed_file"
            else
              echo "Registration disappeared before run enumeration: ${workflow_path}"
            fi
          done < <(
            gh api --paginate "repos/${REPO}/actions/workflows?per_page=100" \
              --jq '.workflows[] | [.id, .name, .path, .state] | @tsv'
          )

          sort -u -o "$run_ids_file" "$run_ids_file"

          delete_run() {
            local run_id="$1"
            if gh api --method DELETE "repos/${REPO}/actions/runs/${run_id}" >/dev/null 2>&1; then
              printf '%s\n' "$run_id" >> "$deleted_file"
              return 0
            fi
            if ! gh api "repos/${REPO}/actions/runs/${run_id}" >/dev/null 2>&1; then
              printf '%s\n' "$run_id" >> "$deleted_file"
              return 0
            fi
            printf 'run-delete\t%s\n' "$run_id" >> "$failed_file"
          }
          export -f delete_run
          export GH_TOKEN REPO deleted_file failed_file

          if [[ -s "$run_ids_file" ]]; then
            xargs -r -n1 -P8 bash -c 'delete_run "$1"' _ < "$run_ids_file"
          fi

          disabled_workflows=0
          while IFS=$'\t' read -r workflow_id workflow_name workflow_path workflow_state; do
            [[ -n "$workflow_id" ]] || continue

            if [[ "$workflow_state" == "active" ]]; then
              if gh api --method PUT \
                "repos/${REPO}/actions/workflows/${workflow_id}/disable" >/dev/null 2>&1; then
                disabled_workflows=$((disabled_workflows + 1))
              elif gh api "repos/${REPO}/actions/workflows/${workflow_id}" >/dev/null 2>&1; then
                printf 'workflow-disable\t%s\t%s\n' "$workflow_id" "$workflow_path" \
                  >> "$failed_file"
              else
                echo "Registration disappeared while disabling: ${workflow_path}"
              fi
            fi

            if remaining_runs=$(gh api \
              "repos/${REPO}/actions/workflows/${workflow_id}/runs?per_page=1" \
              --jq '.total_count' 2>/dev/null); then
              if [[ "$remaining_runs" != "0" ]]; then
                printf 'runs-remaining\t%s\t%s\t%s\n' \
                  "$workflow_id" "$workflow_path" "$remaining_runs" >> "$failed_file"
              fi
            elif gh api "repos/${REPO}/actions/workflows/${workflow_id}" >/dev/null 2>&1; then
              printf 'verification-query\t%s\t%s\n' "$workflow_id" "$workflow_path" \
                >> "$failed_file"
            else
              echo "Verified by absence: ${workflow_path}"
            fi
          done < "$obsolete_file"

          live_count=$(wc -l < "$live_paths_file" | tr -d ' ')
          obsolete_count=$(wc -l < "$obsolete_file" | tr -d ' ')
          requested_run_count=$(wc -l < "$run_ids_file" | tr -d ' ')
          deleted_run_count=$(wc -l < "$deleted_file" | tr -d ' ')
          failed_count=$(wc -l < "$failed_file" | tr -d ' ')

          {
            echo '### Obsolete GitHub Actions cleanup'
            echo
            echo "- Live workflow files kept: ${live_count}"
            echo "- Obsolete workflow registrations processed: ${obsolete_count}"
            echo "- Registrations disabled during this run: ${disabled_workflows}"
            echo "- Historical runs targeted: ${requested_run_count}"
            echo "- Historical runs deleted or already absent: ${deleted_run_count}"
            echo "- Failed operations: ${failed_count}"
            echo
            echo 'Live workflow files:'
            sed 's/^/- `/; s/$/`/' "$live_paths_file"
            if [[ -s "$obsolete_file" ]]; then
              echo
              echo 'Purged registrations:'
              awk -F '\t' '{printf "- `%s` тАФ %s (`%s`, prior state `%s`)\n", $1, $2, $3, $4}' \
                "$obsolete_file"
            fi
            if [[ -s "$failed_file" ]]; then
              echo
              echo 'Failed operations:'
              sed 's/^/- `/' "$failed_file" | sed 's/$/`/'
            fi
          } > "$summary_file"

          cat "$summary_file" >> "$GITHUB_STEP_SUMMARY"
          gh pr comment 72 --body-file "$summary_file" >/dev/null 2>&1 || true

          {
            echo "obsolete_workflows=${obsolete_count}"
            echo "deleted_runs=${deleted_run_count}"
            echo "failed_operations=${failed_count}"
          } >> "$GITHUB_OUTPUT"

          if [[ "$failed_count" != "0" ]]; then
            echo "::error::The Actions purge completed with ${failed_count} failed operation(s)."
            exit 1
          fi

          trap - EXIT

      - name: Restore normal CI and remove cleanup branches
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          OBSOLETE_WORKFLOWS: ${{ steps.purge.outputs.obsolete_workflows }}
          DELETED_RUNS: ${{ steps.purge.outputs.deleted_runs }}
        run: |
          set -euo pipefail

          python3 - <<'PY'
          from pathlib import Path

          path = Path('.github/workflows/ci.yml')
          content = path.read_text()
          start = '  # BEGIN ONE-SHOT ACTIONS REGISTRY PURGE\n'
          end = '  # END ONE-SHOT ACTIONS REGISTRY PURGE\n'
          if content.count(start) != 1 or content.count(end) != 1:
              raise SystemExit('one-shot purge markers are missing or duplicated')
          before, remainder = content.split(start, 1)
          _, after = remainder.split(end, 1)
          path.write_text(before.rstrip() + '\n' + after.lstrip())
          PY

          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add .github/workflows/ci.yml
          git commit -m "chore: complete Actions purge (${OBSOLETE_WORKFLOWS} workflows, ${DELETED_RUNS} runs) [skip ci]"
          git pull --rebase origin main
          git push origin HEAD:main

          for branch in \
            'chore/purge-obsolete-actions-registry' \
            'chore/finish-actions-registry-purge' \
            'chore/fix-actions-purge-registration-race'; do
            encoded=$(python3 -c 'import sys; from urllib.parse import quote; print(quote(sys.argv[1], safe=""))' "$branch")
            gh api --method DELETE "repos/${REPO}/git/refs/heads/${encoded}" >/dev/null 2>&1 \
              || true
          done
  # END ONE-SHOT ACTIONS REGISTRY PURGE

  # BEGIN ONE-SHOT EXISTING ITEM POLICY IMPLEMENTATION
  implement-existing-item-policy:
    if: github.event_name == 'pull_request' && github.head_ref == 'agent/preserve-existing-arr-settings'
    needs: test
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: write
    steps:
      - name: Checkout implementation branch
        uses: actions/checkout@v4
        with:
          ref: agent/preserve-existing-arr-settings
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Apply asserted implementation patch
        run: python3 scripts/implement-existing-item-policy.py

      - name: Install
        run: npm ci

      - name: Validate implementation
        run: |
          npm run ci
          npm run package:release

      - name: Remove temporary helper and publish implementation
        run: |
          set -euo pipefail
          python3 - <<'PY'
          from pathlib import Path

          workflow = Path('.github/workflows/ci.yml')
          content = workflow.read_text()
          content = content.replace(
              '    branches: [main, agent/preserve-existing-arr-settings]\n',
              '    branches: [main]\n',
              1,
          )
          start = '  # BEGIN ONE-SHOT EXISTING ITEM POLICY IMPLEMENTATION\n'
          end = '  # END ONE-SHOT EXISTING ITEM POLICY IMPLEMENTATION\n'
          if content.count(start) != 1 or content.count(end) != 1:
              raise SystemExit('existing-item implementation markers are missing or duplicated')
          before, remainder = content.split(start, 1)
          _, after = remainder.split(end, 1)
          workflow.write_text(before.rstrip() + '\n' + after.lstrip())
          Path('scripts/implement-existing-item-policy.py').unlink()
          PY

          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git commit -m 'Implement existing Arr item preservation policies'
          git push origin HEAD:agent/preserve-existing-arr-settings
  # END ONE-SHOT EXISTING ITEM POLICY IMPLEMENTATION
