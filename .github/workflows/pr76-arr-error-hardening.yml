name: PR 76 Arr error hardening

on:
  push:
    branches: [agent/preserve-existing-arr-settings]

concurrency:
  group: pr76-arr-error-hardening
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  harden:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout branch
        uses: actions/checkout@v4
        with:
          ref: agent/preserve-existing-arr-settings
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Apply hardening
        run: python3 scripts/harden-pr76-arr-errors.py

      - name: Install
        run: npm ci

      - name: Validate
        run: |
          npm run typecheck
          npm test
          npm run build
          npm run lint:manifest
          npm run package:release

      - name: Remove temporary hardening files and publish
        run: |
          set -euo pipefail
          rm -f scripts/harden-pr76-arr-errors.py .github/workflows/pr76-arr-error-hardening.yml
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git commit -m 'Return structured Arr action failures'
          git push origin HEAD:agent/preserve-existing-arr-settings
