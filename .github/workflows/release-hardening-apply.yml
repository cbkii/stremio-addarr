name: Apply release hardening

on:
  push:
    branches:
      - agent/release-hardening-v1.6.0
    paths:
      - scripts/.release-hardening-gz-fixed/**
      - .github/workflows/release-hardening-apply.yml
  pull_request:
    branches:
      - main
    paths:
      - scripts/.release-hardening-gz-fixed/**
      - .github/workflows/release-hardening-apply.yml

permissions:
  contents: write

jobs:
  apply-and-validate:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/release-hardening-v1.6.0
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
      - name: Reassemble release hardening patch
        run: cat scripts/.release-hardening-gz-fixed/part-* | base64 -d | gzip -d > scripts/release-hardening-apply.mjs
      - name: Apply release hardening patch
        run: |
          set -o pipefail
          node scripts/release-hardening-apply.mjs 2>&1 | tee release-hardening.log
      - name: Refresh dependency lockfile
        run: |
          set -o pipefail
          npm install --package-lock-only --ignore-scripts 2>&1 | tee dependency-refresh.log
      - name: Upload implementation diagnostics
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: release-hardening-diagnostics
          path: |
            release-hardening.log
            dependency-refresh.log
            scripts/release-hardening-apply.mjs
          if-no-files-found: warn
      - name: Install exact dependencies
        run: npm ci
      - name: Validate diff
        run: git diff --check
      - name: Run complete CI
        run: npm run ci
      - name: Build release archive smoke test
        run: |
          npm run package:release
          rm -rf release
      - name: Commit validated implementation
        run: |
          rm -rf scripts/.release-hardening scripts/.release-hardening-gz scripts/.release-hardening-gz2 scripts/.release-hardening-gz-fixed
          rm -f scripts/release-hardening-apply.mjs release-hardening.log dependency-refresh.log
          rm -f .github/workflows/release-hardening-apply.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "harden release protocol security and Android TV compatibility"
          git push origin HEAD:agent/release-hardening-v1.6.0
