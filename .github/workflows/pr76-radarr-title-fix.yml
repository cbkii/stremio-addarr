name: PR 76 Radarr title fix

on:
  push:
    branches: [agent/preserve-existing-arr-settings]

concurrency:
  group: pr76-radarr-title-fix
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  fix:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout branch
        uses: actions/checkout@v4
        with:
          ref: agent/preserve-existing-arr-settings
          fetch-depth: 0
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - name: Apply focused fix
        run: python3 scripts/fix-pr76-radarr-title.py
      - name: Install
        run: npm ci
      - name: Validate
        run: |
          npm run typecheck
          npm test
          npm run build
          npm run lint:manifest
          npm run package:release
      - name: Remove temporary files and publish
        run: |
          set -euo pipefail
          rm -f scripts/fix-pr76-radarr-title.py .github/workflows/pr76-radarr-title-fix.yml
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git commit -m 'Keep Radarr title hand-off unambiguous'
          git push origin HEAD:agent/preserve-existing-arr-settings
