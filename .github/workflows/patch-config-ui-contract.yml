name: Apply config UI contract corrections

on:
  push:
    branches:
      - agent/android-tv-config-ui
    paths:
      - '.github/workflows/patch-config-ui-contract.yml'

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/android-tv-config-ui
      - name: Preserve scheme-less card URL contract and correct leakage assertions
        run: |
          python - <<'PY'
          from pathlib import Path

          config_ui = Path('src/config-ui.ts')
          text = config_ui.read_text()
          replacements = {
              "set('RADARR_CARD_URL', normalizeHttpUrl(radarr['cardUrl'], 'Radarr card URL', true));":
                  "set('RADARR_CARD_URL', readStringField(radarr, 'cardUrl', config.radarr.cardUrl).replace(/\\/+$/, ''));",
              "set('SONARR_CARD_URL', normalizeHttpUrl(sonarr['cardUrl'], 'Sonarr card URL', true));":
                  "set('SONARR_CARD_URL', readStringField(sonarr, 'cardUrl', config.sonarr.cardUrl).replace(/\\/+$/, ''));",
          }
          for old, new in replacements.items():
              if old not in text:
                  raise SystemExit(f'missing expected source text: {old}')
              text = text.replace(old, new)
          config_ui.write_text(text)

          tests = Path('test/config-ui.test.ts')
          text = tests.read_text()
          text = text.replace(
              "assert.ok(!html.includes('radarr-key'));",
              "assert.ok(!html.includes('value=\"radarr-key\"'));"
          ).replace(
              "assert.ok(!html.includes('sonarr-key'));",
              "assert.ok(!html.includes('value=\"sonarr-key\"'));"
          )
          tests.write_text(text)
          PY
      - name: Commit correction
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add src/config-ui.ts test/config-ui.test.ts
          git commit -m 'fix: preserve existing card URL configuration contract'
          git push origin HEAD:agent/android-tv-config-ui
